version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/whereismybus
      - REDIS_URL=redis://redis:6379
    depends_on:
      - frontend
      - mongo
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      - NODE_ENV=production

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mongo-data:

# Notes:
# - Frontend is served by nginx on container port 80 and mapped to host 5173 for parity with dev.
# - In production you may want to use a reverse proxy and proper TLS termination.
